<!-- ─────────────────────────────────────────────────────────────────────
  v6 Sheet 组件族（命名与 Drawer 族对称）

  - jh-sheet            ：纯叠层壳（对标 jh-drawer）
                          标题栏 actionList + 默认插槽 + actions 插槽
  - jh-sheet-order-panel：排序内容（由 MobileOrder 中继注入 children）
  - jh-sheet-menu-grid  ：图标网格内容（由 MobileAction 中继注入 children）
  - jh-form-sheet       ：表单式底部叠层（对标 jh-form-drawer）

  Schema：Sheet → jh-sheet，FormSheet → jh-form-sheet
  标题栏按钮统一 props.actionList（与 FormSheet / Drawer / FormDrawer 一致）

  注意：不内置 doUiAction，只对外 emit，由页面承接。
───────────────────────────────────────────────────────────────────── -->
<style>
  .bottom-sheet-card {
    border: none !important;
  }

  .bottom-sheet-card-title {
    border-bottom: 1px solid #e0e0e0 !important;
  }
</style>

<!-- ══════════════════════════════════════════════════════════════
  jh-sheet-order-panel  排序列表内容
══════════════════════════════════════════════════════════════════ -->
<script type="text/html" id="jh-sheet-order-panel-template">
  <div>
    <div class="pt-3">
      <v-row>
        <v-col cols="12" class="pb-0" v-for="(item, i) in orderList" :key="'o-' + i">
          <v-btn
            block
            class="p-3 rounded"
            :color="isOrderActive(item.value) ? 'primary' : 'gray'"
            @click="localOrder = item.value"
          >{{ item.text }}</v-btn>
        </v-col>
      </v-row>
    </div>
    <div class="flex justify-end px-3 jh-safe-bottom-3 bg-white pt-3">
      <v-btn @click="handleReset">重置</v-btn>
      <v-btn color="success" class="ml-3" @click="handleConfirm">确认</v-btn>
    </div>
  </div>
</script>
<script>
Vue.component('jh-sheet-order-panel', {
  template: '#jh-sheet-order-panel-template',
  props: {
    orderList: { type: Array, default: () => [] },
  },
  data() {
    return { localOrder: null };
  },
  methods: {
    isOrderActive(val) {
      try { return JSON.stringify(this.localOrder) === JSON.stringify(val); }
      catch (e) { return this.localOrder === val; }
    },
    handleReset() {
      this.localOrder = null;
      this.$emit('reset');
      if (this.$parent && this.$parent.$emit) this.$parent.$emit('reset');
    },
    handleConfirm() {
      this.$emit('confirm', this.localOrder);
      if (this.$parent && this.$parent.$emit) this.$parent.$emit('confirm', this.localOrder);
    },
  },
});
</script>

<!-- ══════════════════════════════════════════════════════════════
  jh-sheet-menu-grid  图标操作网格
══════════════════════════════════════════════════════════════════ -->
<script type="text/html" id="jh-sheet-menu-grid-template">
  <div class="pt-3">
    <div class="grid" :class="'grid-cols-' + cols" style="gap:12px">
      <template v-for="(action, idx) in actionList">
        <div v-if="action && !action.tag" :key="'a-' + idx" class="flex flex-col gap-2 mx-auto">
          <div
            class="text-center"
            :class="{ 'opacity-60 pointer-events-none': action.loading }"
            @click="handleActionClick(action)"
          >
            <div class="bg-[#EDFAF5] mb-2 mx-auto w-[48px] flex items-center justify-center aspect-square !rounded-md relative">
              <v-progress-circular
                v-if="action.loading"
                indeterminate
                size="20"
                width="2"
                color="primary"
              ></v-progress-circular>
              <template v-else>
                <v-icon v-if="isMdiIcon(action.icon)" :color="action.color || 'primary'" size="24">{{ action.icon || 'mdi-cog' }}</v-icon>
                <jh-icon v-else :name="action.icon || 'settings'" :size="24" :style="{ color: resolveActionColor(action) }"></jh-icon>
              </template>
            </div>
            <div class="w-full">{{ action.value }}</div>
          </div>
        </div>
        <div v-else :key="'t-' + idx">
          <slot name="custom" :action="action" :index="idx"></slot>
        </div>
      </template>
    </div>
  </div>
</script>
<script>
Vue.component('jh-sheet-menu-grid', {
  template: '#jh-sheet-menu-grid-template',
  props: {
    actionList: { type: Array, default: () => [] },
    cols: { type: [Number, String], default: 2 },
  },
  methods: {
    isMdiIcon(icon) {
      if (!icon) return false;
      return icon.startsWith('mdi-') || icon.includes(':');
    },
    resolveActionColor(action) {
      const colorMap = {
        primary: "var(<$ ctx.app.config.primaryColor $>, #1976D2)",
        success: 'var(--v-success-base, #4CAF50)',
        error:   'var(--v-error-base,   #F44336)',
        warning: 'var(--v-warning-base, #FB8C00)',
        info:    'var(--v-info-base,    #2196F3)',
      };
      const c = (action && action.color) || 'primary';
      return colorMap[c] || c;
    },
    handleActionClick(action) {
      if (!action || action.loading) return;
      this.$emit('action', action);
      this.$emit('menu-action', action);
      if (this.$parent && this.$parent.$emit) {
        this.$parent.$emit('action', action);
        this.$parent.$emit('menu-action', action);
      }
      if (this.$parent && typeof this.$parent.closeSheet === 'function') {
        this.$parent.closeSheet();
      }
    },
  },
});
</script>

<!-- ══════════════════════════════════════════════════════════════
  jh-sheet  纯叠层壳
══════════════════════════════════════════════════════════════════ -->
<script type="text/html" id="jh-sheet-v6-template">
  <!--
    与 jh-drawer 一致：用 v-model 语义驱动（computed 桥接 .sync 的 update:shown）。
    attach 默认 false，叠层留在 .v-application 内；挂 body 易脱离 Vuetify 根节点导致「value 已为 true 但仍看不见」。
  -->
  <v-bottom-sheet
    v-model="openProxy"
    :attach="attachTarget"
    :persistent="persistent"
    :z-index="stackZIndex"
    :lazy="lazy"
    v-bind="bottomSheetAttrs"
  >
    <v-card :class="mergedCardClass" class="border-none !rounded-t-lg bottom-sheet-card">
      <!-- 标题栏 -->
      <v-card-title class=" px-2.5 py-2 h-[50px] bottom-sheet-card-title relative border-b">
        <div class="absolute left-3 space-x-2">
          <slot name="head-actions">
            <template v-if="resolvedTitleActionList.length > 0">
              <jh-mobile-actions
                :action-list="resolvedTitleActionList"
                :initial-data="initialData"
                :scope="scope"
                :resolve-scope="headActionResolveScope"
                @action="handleTitleAction"
              />
            </template>
          </slot>
        </div>
        <span class="text-base w-full text-center">{{ title }}</span>
        <v-spacer></v-spacer>

        <div class="absolute right-3 primary--text text-xs text-center" @click="closeSheet">
          <jh-icon name="x" :size="22" color="primary"></jh-icon>
          <div class="primary--text mt-[-2px]">关闭</div>
        </div>
      </v-card-title>

      <v-card-text :class="mergedBodyClass" :style="bodyAreaStyle">
        <slot></slot>
      </v-card-text>

      <v-card-actions :class="actionsClass">
        <slot name="actions"></slot>
      </v-card-actions>
    </v-card>
  </v-bottom-sheet>
</script>

<script>
/** Sheet 族内容区高度（jh-sheet / jh-form-sheet 表单滚动共用） */
function formatSheetHeightToken(val) {
  if (val == null || val === '') return '';
  return /^\d+$/.test(String(val)) ? `${val}px` : String(val);
}

function resolveSheetBodyAreaStyle({ maxBodyHeight, bodyHeightMode, bodyHeight, autoHeight, viewportOffset }) {
  if (bodyHeight) {
    const h = formatSheetHeightToken(bodyHeight);
    if (!h) return {};
    return { height: h, overflowY: 'auto', boxSizing: 'border-box' };
  }
  if (maxBodyHeight) {
    const h = formatSheetHeightToken(maxBodyHeight);
    if (!h) return {};
    // 默认 fill（与 jh-sheet / FormSheet props 一致）；仅显式 content 或旧 autoHeight:true 走 content
    const mode = bodyHeightMode
      || (autoHeight === true ? 'content' : 'fill');
    return Object.assign(
      { maxHeight: h, overflowY: 'auto', boxSizing: 'border-box' },
      mode === 'fill' ? { height: h } : {},
    );
  }
  if (autoHeight == null || viewportOffset == null || viewportOffset === '') return {};
  const offset = Number(viewportOffset);
  if (Number.isNaN(offset)) return {};
  const key = autoHeight ? 'maxHeight' : 'height';
  return { [key]: `calc(100vh - ${offset}px)`, overflowY: 'auto', boxSizing: 'border-box' };
}

Vue.component("jh-sheet", {
  template: "#jh-sheet-v6-template",
  mixins: [window.jhActionWhenMixin],
  inheritAttrs: false,
  props: {
    value:        { type: Boolean, default: null },
    shown:        { type: Boolean, default: null },
    stackZIndex:  { type: [Number, String], default: 340 },
    attach:       { type: [Boolean, String], default: false },
    lazy:         { type: Boolean, default: false },
    title:        { type: String,  default: "" },
    // 标题栏按钮（与 FormSheet / Drawer 统一）
    actionList:   { type: Array,   default: () => [] },
    // 兼容旧标题栏 key（编译期迁到 actionList）
    headActionList: { type: Array,   default: () => [] },
    headActionResolveScope: { type: String, default: '' },
    initialData:  { type: Object,  default: () => ({}) },
    scope:        { type: Object,  default: null },
    rounded:      { type: Boolean, default: false },
    persistent:   { type: Boolean, default: false },
    minCardHeight: { type: [String, Number], default: '100px' },
    autoHeight:      { type: Boolean, default: null },
    viewportOffset:  { type: [Number, String], default: null },
    maxBodyHeight:   { type: String, default: null },
    bodyHeightMode:  { type: String, default: 'fill' },
    bodyHeight:      { type: String, default: null },
    cardClass:    { type: [String, Array, Object], default: () => ["ma-0", "w-full", "rounded-b-0"] },
    bodyClass:    { type: [String, Array, Object], default: () => ["px-4", "py-4"] },
    actionsClass: { type: [String, Array, Object], default: () => ["flex", "justify-end", "px-3", "jh-safe-bottom-3", "bg-white"] },
  },
  computed: {
    resolvedTitleActionList() {
      if (Array.isArray(this.actionList) && this.actionList.length) return this.actionList;
      return this.headActionList || [];
    },
    resolvedMinCardHeight() {
      const v = this.minCardHeight;
      if (v == null || v === '') return '100px';
      return /^\d+$/.test(String(v)) ? `${v}px` : String(v);
    },
    resolvedViewportOffset() {
      if (this.viewportOffset != null && this.viewportOffset !== '') {
        return Number(this.viewportOffset);
      }
      return 102;
    },
    resolvedMaxBodyHeight() {
      if (this.bodyHeight) return this.bodyHeight;
      if (this.maxBodyHeight) return this.maxBodyHeight;
      return `calc(100vh - ${this.resolvedViewportOffset}px)`;
    },
    resolvedBodyHeightMode() {
      if (this.bodyHeightMode === 'content' || this.bodyHeightMode === 'fill') {
        return this.bodyHeightMode;
      }
      if (this.bodyHeight) return 'fill';
      // 默认 fill；仅旧 autoHeight:true 回退 content
      return this.autoHeight === true ? 'content' : 'fill';
    },
    openProxy: {
      get() {
        return this.value != null ? this.value : !!this.shown;
      },
      set(val) {
        const next = !!val;
        this.$emit('update:shown', next);
        this.$emit('input', next);
      },
    },
    attachTarget() {
      if (this.attach === false || this.attach === '' || this.attach == null) return false;
      return this.attach;
    },
    mergedCardClass() {
      const tail = this.rounded ? ['rounded-t-lg'] : [];
      const minH = `min-h-[${this.resolvedMinCardHeight}]`;
      const base = this.cardClass;
      const withMin = (arr) => [...arr, minH, ...tail];
      if (Array.isArray(base)) return withMin(base);
      if (base && typeof base === 'object') return withMin([base]);
      if (base == null || base === '') return withMin([]);
      return withMin([base]);
    },
    bodyAreaStyle() {
      return resolveSheetBodyAreaStyle({
        bodyHeight: this.bodyHeight,
        maxBodyHeight: this.resolvedMaxBodyHeight,
        bodyHeightMode: this.resolvedBodyHeightMode,
        autoHeight: this.autoHeight,
        viewportOffset: this.resolvedViewportOffset,
      });
    },
    mergedBodyClass() {
      const scroll = Object.keys(this.bodyAreaStyle).length ? ['overflow-y-auto'] : [];
      const base = this.bodyClass;
      if (Array.isArray(base)) return [...base, ...scroll];
      if (base && typeof base === 'object') return [base, ...scroll];
      if (base == null || base === '') return scroll;
      return [base, ...scroll];
    },
    bottomSheetAttrs() {
      const raw = this.$attrs || {};
      const skip = new Set([
        'value', 'shown', 'stack-z-index', 'stackZIndex', 'attach', 'lazy',
        'title', 'action-list', 'actionList',
        'head-action-list', 'headActionList', 'initial-data', 'initialData', 'scope',
        'rounded',
        'persistent',
        'min-card-height', 'minCardHeight',
        'auto-height', 'autoHeight', 'viewport-offset', 'viewportOffset',
        'max-body-height', 'maxBodyHeight', 'body-height-mode', 'bodyHeightMode', 'body-height', 'bodyHeight',
        'card-class', 'cardClass', 'body-class', 'bodyClass', 'actions-class', 'actionsClass',
      ]);
      const out = {};
      Object.keys(raw).forEach(k => {
        if (!skip.has(k)) out[k] = raw[k];
      });
      return out;
    },
  },
  methods: {
    closeSheet() {
      this.openProxy = false;
    },
    handleTitleAction(actionId) {
      if (!actionId) return;
      const scopeOpts = this.headActionResolveScope ? { scope: this.headActionResolveScope } : undefined;
      const action = (this.resolvedTitleActionList || []).find(a => {
        if (!a) return false;
        const resolved = this.resolveDoUiActionId(a, null, scopeOpts);
        return resolved === actionId
          || a.actionId === actionId
          || a.uiAction === actionId
          || a.intent === actionId;
      });
      const resolved = action
        ? this.resolveDoUiActionId(action, null, scopeOpts)
        : actionId;
      this.$emit('action', resolved);
      this.$emit('head-action', resolved);
    },
    /** @deprecated 使用 handleTitleAction */
    handleHeadAction(actionId) {
      this.handleTitleAction(actionId);
    },
  },
});
</script>

<!-- ─────────────────────────────────────────────────────────────────────
  jh-form-sheet：表单式底部叠层（对标 jh-form-drawer）
  · tabList / fieldList / fields / actionList / beforeCloseConfirm / scope 等与 FormDrawer 一致
  · shown.sync（及 input）控制显隐；关闭可走脏检测 tryClose
───────────────────────────────────────────────────────────────────── -->

<script type="text/html" id="jh-form-sheet-v6-template">
  <jh-sheet
    :value="resolvedValue"
    :rounded="rounded"
    :persistent="effectivePersistent"
    :min-card-height="minCardHeight"
    :title="sheetTitle"
    :body-class="sheetBodyClass"
    :max-body-height="resolvedMaxBodyHeight"
    :body-height-mode="resolvedBodyHeightMode"
    :action-list="toolbarActions"
    head-action-resolve-scope="form"
    :initial-data="initialData"
    :scope="scope"
    @input="onSheetValueInput"
    @action="handleMobileAction"
  >
    <v-tabs
      v-if="resolvedTabList.length > 1"
      v-model="activeTab"
      color="success"
      class="px-4"
    >
      <v-tab
        v-for="(tab, idx) in resolvedTabList"
        :key="'form-tab-' + (tab.key || idx)"
      >{{ tab.title || ('Tab ' + (idx + 1)) }}</v-tab>
    </v-tabs>
    <v-tabs-items v-if="resolvedTabList.length > 1" v-model="activeTab">
      <v-tab-item
        v-for="(tab, idx) in resolvedTabList"
        :key="'form-tab-item-' + (tab.key || idx)"
      >
        <jh-form
          class="overflow-hidden overflow-y-auto pb-4"
          :style="formScrollStyle"
          :ref="_formRefName(tab)"
          :field-list="tab.fieldList"
          :initialData="initialData"
          :origin-data="_originSnapshot"
          :cols="tab.cols"
          :gap="tab.gap"
          :label-mode="tab.labelMode"
          :scope="scope"
          @field-change="$emit('field-change', $event)"
        >
          <template
            v-for="slotN in formForwardedSlotNames"
            :key="'form-slot-' + idx + '-' + slotN"
            v-slot:[slotN]="slotProps"
          >
            <slot :name="slotN" v-bind="slotProps || {}"></slot>
          </template>
        </jh-form>
      </v-tab-item>
    </v-tabs-items>
    <jh-form
      v-else
      class="overflow-hidden overflow-y-auto pb-4"
      :style="formScrollStyle"
      :ref="_formRefName(resolvedTabList[0])"
      :field-list="resolvedTabList[0] ? resolvedTabList[0].fieldList : []"
      :initialData="initialData"
      :origin-data="_originSnapshot"
      :cols="resolvedTabList[0] ? resolvedTabList[0].cols : cols"
      :gap="resolvedTabList[0] ? resolvedTabList[0].gap : gap"
      :label-mode="resolvedTabList[0] ? resolvedTabList[0].labelMode : labelMode"
      :scope="scope"
      @field-change="$emit('field-change', $event)"
    >
      <template
        v-for="slotN in formForwardedSlotNames"
        :key="'form-slot-single-' + slotN"
        v-slot:[slotN]="slotProps"
      >
        <slot :name="slotN" v-bind="slotProps || {}"></slot>
      </template>
    </jh-form>
  </jh-sheet>
</script>

<script>
Vue.component("jh-form-sheet", {
  inheritAttrs: false,
  template: "#jh-form-sheet-v6-template",
  mixins: [window.jhActionWhenMixin],
  props: {
    value:       { type: Boolean, default: null },
    shown:       { type: Boolean, default: null },
    title:       { type: String,  default: '' },
    formKey:     { type: String,  default: '' },
    initialData: { type: Object,  default: () => ({}) },
    tabList:     { type: Array,   default: () => [] },
    fieldList:   { type: Array,   default: () => [] },
    fields:      { type: Array,   default: () => [] },
    beforeCloseConfirm:       { type: Boolean, default: false },
    beforeCloseCompareFields: { type: Array,   default: null },
    cols:        { type: Number,  default: 1 },
    gap:         { type: String,  default: '0' },
    labelMode:   { type: String,  default: 'inline' }, // v4 mobile：标签左 + 输入右
    // 标题栏按钮（与 Drawer / FormDrawer / Sheet 统一）
    actionList:   { type: Array,   default: () => [] },
    // 兼容旧标题栏 key（编译期会迁到 actionList）
    headActionList:  { type: Array,   default: null },
    autoHeight:      { type: Boolean, default: null },
    /** calc(100vh - Npx) 扣减；v7 FormSheet 默认单 tab 102、多 tab 152 */
    viewportOffset:  { type: Number, default: null },
    /** 覆盖 calc，如 '70vh'、'400px' */
    maxBodyHeight:   { type: String, default: null },
    /** 默认 fill（与 jh-sheet 一致）；显式传 content 可改为内容撑开 */
    bodyHeightMode:  { type: String, default: 'fill' },
    /** 固定内容区高度；与 maxBodyHeight 互斥时 bodyHeight 优先 */
    bodyHeight:      { type: String, default: null },
    /** 点外侧不关闭 */
    persistent:      { type: Boolean, default: false },
    /** 卡片 min-h，透传 jh-sheet */
    minCardHeight:   { type: [String, Number], default: null },
    scope:       { type: Object,  default: null },
    /** true：不显示标题栏「重置 / 确认」（仍保留各 tab 的 actionList 与「取消」） */
    hiddenBtn:   { type: Boolean, default: false },
    /** 透传给 jh-sheet 内容区；默认可滚动区域 */
    bodyClass:   { type: [Array, Object, String], default: null },
    /** 透传 jh-sheet：true 时卡片顶部 rounded-t-lg */
    rounded:     { type: Boolean, default: false },
  },
  data() {
    return {
      activeTab: 0,
      _originSnapshot: {},
      _isHandlingClose: false,
    };
  },
  watch: {
    resolvedValue(val, oldVal) {
      if (val && !oldVal) {
        this._originSnapshot = _.cloneDeep(this.initialData || {});
        this.activeTab = 0;
      }
    },
  },
  computed: {
    resolvedValue() {
      return this.value != null ? this.value : !!this.shown;
    },
    sheetTitle() {
      return this.title || '高级搜索';
    },
    sheetBodyClass() {
      if (this.bodyClass != null && this.bodyClass !== '') return this.bodyClass;
      return [ 'px-0', 'py-0', 'pa-0' ];
    },
    resolvedViewportOffset() {
      if (this.viewportOffset != null && this.viewportOffset !== '') {
        return Number(this.viewportOffset);
      }
      return (this.resolvedTabList && this.resolvedTabList.length > 1) ? 152 : 102;
    },
    resolvedMaxBodyHeight() {
      if (this.bodyHeight) return this.bodyHeight;
      if (this.maxBodyHeight) return this.maxBodyHeight;
      return `calc(100vh - ${this.resolvedViewportOffset}px)`;
    },
    resolvedBodyHeightMode() {
      if (this.bodyHeightMode === 'content' || this.bodyHeightMode === 'fill') {
        return this.bodyHeightMode;
      }
      if (this.bodyHeight) return 'fill';
      // 默认 fill；仅旧 autoHeight:true 回退 content
      return this.autoHeight === true ? 'content' : 'fill';
    },
    formScrollStyle() {
      return {};
    },
    resolvedFieldList() {
      return (this.fieldList && this.fieldList.length) ? this.fieldList : (this.fields || []);
    },
    resolvedTabList() {
      if (Array.isArray(this.tabList) && this.tabList.length) {
        return this.tabList.map((tab, idx) => ({
          key: tab.key || String(idx),
          title: tab.title || tab.label || ('Tab ' + (idx + 1)),
          fieldList: (tab.fieldList && tab.fieldList.length) ? tab.fieldList : (tab.fields || []),
          cols: tab.cols != null ? tab.cols : this.cols,
          gap: tab.gap != null ? tab.gap : this.gap,
          labelMode: tab.labelMode || this.labelMode,
          actionList: Array.isArray(tab.actionList) ? tab.actionList : (tab.headActionList || []),
          beforeCloseConfirm: !!tab.beforeCloseConfirm,
          beforeCloseCompareFields: Array.isArray(tab.beforeCloseCompareFields) ? tab.beforeCloseCompareFields : null,
        }));
      }
      return [{
        key: 'default',
        title: this.sheetTitle,
        fieldList: this.resolvedFieldList,
        cols: this.cols,
        gap: this.gap,
        labelMode: this.labelMode,
        actionList: Array.isArray(this.actionList) ? this.actionList : (this.headActionList || []),
        beforeCloseConfirm: !!this.beforeCloseConfirm,
        beforeCloseCompareFields: Array.isArray(this.beforeCloseCompareFields) ? this.beforeCloseCompareFields : null,
      }];
    },
    currentTabConfig() {
      return this.resolvedTabList[this.activeTab] || this.resolvedTabList[0] || {};
    },
    toolbarActions() {
      const list = this.currentTabConfig.actionList || [];
      return this.filterVisibleActions(list);
    },
    formForwardedSlotNames() {
      const slots = this.$scopedSlots || {};
      const names = Object.keys(slots);
      return names.filter(name => typeof name === 'string' && (
        name.startsWith('field-') ||
        name.startsWith('label-') ||
        name.startsWith('after-')
      ));
    },
    /** beforeCloseConfirm 时禁止点外侧关闭，避免绕过脏检测 */
    effectivePersistent() {
      if (this.persistent) return true;
      return (this.resolvedTabList || []).some(tab => tab && tab.beforeCloseConfirm);
    },
  },
  methods: {
    async onSheetValueInput(nextVal) {
      if (nextVal === false) {
        await this.tryClose();
        return;
      }
      this.$emit('update:shown', true);
      this.$emit('input', true);
    },
    getCurrentTabFieldKeys() {
      const tab = this.currentTabConfig || {};
      if (Array.isArray(tab.beforeCloseCompareFields) && tab.beforeCloseCompareFields.length) {
        return tab.beforeCloseCompareFields;
      }
      const structuralTypes = ['section', 'divider', 'tip'];
      return (tab.fieldList || [])
        .filter(f => f && !structuralTypes.includes(f.type))
        .map(f => f.key)
        .filter(Boolean);
    },
    pickItemByKeys(item, keys) {
      const out = {};
      (keys || []).forEach(key => { out[key] = item ? item[key] : undefined; });
      return out;
    },
    async checkFormBeforeClose() {
      const tab = this.currentTabConfig || {};
      if (!tab.beforeCloseConfirm) return true;
      const keys = this.getCurrentTabFieldKeys();
      if (!keys.length) return true;
      const current = this.pickItemByKeys(this.initialData || {}, keys);
      const origin = this.pickItemByKeys(this._originSnapshot || {}, keys);
      if (JSON.stringify(current) === JSON.stringify(origin)) return true;
      if (!window.jhConfirmDialog) return true;
      const res = await window.jhConfirmDialog({
        title: '保存提示',
        htmlTemplate: '你还没有保存更改内容，是否先保存？',
        confirmText: '不保存',
        confirmColor: 'error',
        width: '300px',
      });
      return res;
    },
    async tryClose() {
      if (this._isHandlingClose) return;
      this._isHandlingClose = true;
      try {
        const ok = await this.checkFormBeforeClose();
        if (!ok) return;
        this.$emit('update:shown', false);
        this.$emit('input', false);
      } finally {
        this._isHandlingClose = false;
      }
    },
    handleMobileAction(actionId) {
      const scopeOpts = { scope: 'form' };
      const action = (this.toolbarActions || []).find(a => {
        if (!a) return false;
        const resolved = this.resolveDoUiActionId(a, null, scopeOpts);
        return resolved === actionId
          || a.actionId === actionId
          || a.uiAction === actionId
          || a.intent === actionId;
      });
      this.handleTabAction(action || { uiAction: actionId });
    },
    async handleTabAction(action) {
      if (this.isActionDisabled(action) || this.isActionLoading(action)) return;
      const actionId = this.resolveDoUiActionId(action, null, { scope: 'form' });
      if (!actionId) {
        await this.tryClose();
        return;
      }
      if (actionId === 'reset') {
        this.$emit('reset');
        return;
      }
      if (actionId === 'confirm') {
        if (!(await this.validate())) return;
        this.$emit('confirm');
        return;
      }
      this.$emit('action', actionId);
    },
    _capitalize(str) {
      if (!str) return '';
      return str.charAt(0).toUpperCase() + str.slice(1);
    },
    _formRefName(tab) {
      const prefix = this.formKey || '';
      const tabSuffix = (tab && tab.key && tab.key !== 'default') ? this._capitalize(tab.key) : '';
      return prefix + tabSuffix + 'Form';
    },
    getActiveFormRef() {
      const tab = this.resolvedTabList[this.activeTab] || this.resolvedTabList[0];
      const refName = this._formRefName(tab);
      const ref = this.$refs[refName];
      return Array.isArray(ref) ? ref[0] : ref;
    },
    validate() {
      const formRef = this.getActiveFormRef();
      return formRef && formRef.validate ? formRef.validate() : true;
    },
    resetValidation() {
      const formRef = this.getActiveFormRef();
      return formRef && formRef.resetValidation ? formRef.resetValidation() : undefined;
    },
  },
});
</script>
