<!-- ─────────────────────────────────────────────────────────────────────
  jh-search  统一搜索组件

  props:
    fields        Array   筛选字段配置：
                    { key, label, type, op, options, multiple, placeholder, attrs }
                    · type: 'text'(默认) | 'select' | 'date' | 'number'
                    · op:   'eq'(默认) | 'like' | 'in' | 'gte' | 'lte'
                    · options: Array | String（Vue 变量路径）
                    · multiple: Boolean（select 多选时自动 op='in'）
    keyword       Object  全局模糊搜索配置：
                    { fields: string[], placeholder?: string }
    searchBtn     Boolean 是否显示查询按钮，默认 true

  events:
    @search       { where, whereLike, whereIn, whereOrOptions }

  inject:
    jhPage（可选）：用于解析 options 字符串路径
───────────────────────────────────────────────────────────────────── -->
<script type="text/html" id="jh-search-template">
  <div v-bind="$attrs" v-on="$listeners" class="inline-flex items-center flex-wrap gap-2">

    <!-- keyword 全局搜索 -->
    <v-text-field
      v-if="resolvedKeywordConfig && resolvedKeywordConfig.fields && resolvedKeywordConfig.fields.length"
      v-model="localKeyword"
      :placeholder="resolvedKeywordConfig.placeholder || '搜索'"
      class="jh-v-input max-w-[240px]"
      dense single-line filled clearable
      @keyup.enter="handleSearch"
      @click:clear="localKeyword = ''; handleSearch()"
      :style="{ width: resolvedKeywordConfig.width || '200px', minWidth: resolvedKeywordConfig.width || '200px', maxWidth: resolvedKeywordConfig.width || '200px' }"
    >
      <template v-slot:prepend-inner>
        <jh-icon name="lucide:search" size="20"></jh-icon>
      </template>
    </v-text-field>

    <!-- 字段筛选 -->
    <template v-for="(field, idx) in resolvedFieldList">
      <!-- 跳过 keyword 类型（已由上面的 keyword 输入框处理） -->
      <template v-if="field.type === 'keyword'"></template>

      <!-- select 单选 -->
      <v-select
        v-else-if="field.type === 'select' && !field.multiple"
        :key="field.key || idx"
        v-model="localValues[field.key]"
        v-bind="field.attrs || {}"
        :items="resolveOptions(field)"
        :prefix="field.label"
        class="jh-v-input max-w-[180px]"
        dense single-line filled clearable
        @change="!resolvedShowBtn && handleSearch()"
      ></v-select>

      <!-- select 多选 -->
      <v-select
        v-else-if="field.type === 'select' && field.multiple"
        :key="field.key || idx"
        v-model="localValues[field.key]"
        v-bind="field.attrs || {}"
        :items="resolveOptions(field)"
        :prefix="field.label"
        class="jh-v-input max-w-[220px]"
        dense single-line filled clearable multiple small-chips deletable-chips
        @change="!resolvedShowBtn && handleSearch()"
      ></v-select>

      <!-- date -->
      <v-menu v-else-if="field.type === 'date'"
        :key="field.key || idx"
        transition="scale-transition" offset-y min-width="auto">
        <template v-slot:activator="{ on, attrs }">
          <v-text-field
            v-model="localValues[field.key]"
            v-bind="Object.assign({}, field.attrs || {}, attrs)"
            v-on="on"
            :prefix="field.label"
            prepend-inner-icon="mdi-calendar-range"
            class="jh-v-input max-w-[180px]"
            dense single-line filled readonly clearable
            @click:clear="localValues[field.key] = null; !resolvedShowBtn && handleSearch()"
          ></v-text-field>
        </template>
        <v-date-picker
          color="success" elevation="20" no-title
          v-model="localValues[field.key]"
          @input="!resolvedShowBtn && handleSearch()"
        ></v-date-picker>
      </v-menu>

      <!-- text / number -->
      <v-text-field
        v-else
        :key="field.key || idx"
        v-model="localValues[field.key]"
        v-bind="field.attrs || {}"
        :prefix="field.label"
        :type="field.type === 'number' ? 'number' : 'text'"
        class="jh-v-input max-w-[180px]"
        dense single-line filled clearable
        @keyup.enter="handleSearch"
        @click:clear="localValues[field.key] = ''; !resolvedShowBtn && handleSearch()"
      ></v-text-field>
    </template>

    <!-- 查询按钮 -->
    <v-btn v-if="resolvedShowBtn" class="elevation-0" color="success" small @click="handleSearch">
      <jh-icon v-if="btnIcon" :name="btnIcon" size="16" class="mr-1"></jh-icon>{{ btnText }}
    </v-btn>

  </div>
</script>

<script>
Vue.component('jh-search', {
  inheritAttrs: false,
  template: '#jh-search-template',
  inject: { jhPage: { default: null } },
  props: {
    fieldList:     { type: Array,   default: null },
    keywordConfig: { type: Object, default: null },
    showBtn:       { type: Boolean, default: null },
    btnText:       { type: String,  default: '查询' },
    btnIcon:       { type: String,  default: 'search' },
    // 旧 prop alias
    fields:        { type: Array,   default: null },
    searchFieldList: { type: Array, default: null },
    keyword:       { type: Object,  default: null },
    searchBtn:     { type: Boolean, default: null },
    showSearchBtn: { type: Boolean, default: null },
  },
  data() {
    return {
      localKeyword: '',
      localValues: {},
    };
  },
  created() {
    this.resolvedFieldList.forEach(f => {
      if (f.type === 'keyword') return;
      this.$set(this.localValues, f.key, f.multiple ? [] : null);
    });
  },
  computed: {
    resolvedFieldList() {
      if (Array.isArray(this.fieldList)) return this.fieldList;
      if (Array.isArray(this.searchFieldList)) return this.searchFieldList;
      return this.fields || [];
    },
    resolvedKeywordConfig() {
      return this.keywordConfig || this.keyword || null;
    },
    resolvedShowBtn() {
      if (this.showBtn != null) return this.showBtn;
      if (this.showSearchBtn != null) return this.showSearchBtn;
      if (this.searchBtn != null) return this.searchBtn;
      return true;
    },
  },
  methods: {
    resolveOptions(field) {
      if (!field.options) return [];
      if (Array.isArray(field.options)) return field.options;
      if (typeof field.options === 'string') {
        const state = this.jhPage ? this.jhPage.state : null;
        if (state) return _.get(state, field.options) || [];
        return _.get(this.$root, field.options) || [];
      }
      return [];
    },
    handleSearch() {
      const where = {};
      const whereLike = {};
      const whereIn = {};
      let whereOrOptions = [];

      for (const field of this.resolvedFieldList) {
        if (field.type === 'keyword') continue;
        const val = this.localValues[field.key];
        if (val == null || val === '' || (Array.isArray(val) && !val.length)) continue;

        const op = field.multiple ? 'in' : (field.op || 'eq');
        switch (op) {
          case 'like':
            whereLike[field.key] = _.isString(val) ? val.trim() : val;
            break;
          case 'in':
            whereIn[field.key] = Array.isArray(val) ? val : [val];
            break;
          default:
            where[field.key] = _.isString(val) ? val.trim() : val;
            break;
        }
      }

      if (this.resolvedKeywordConfig && this.resolvedKeywordConfig.fields && this.resolvedKeywordConfig.fields.length) {
        const k = (this.localKeyword || '').trim();
        if (k) {
          this.resolvedKeywordConfig.fields.forEach(fieldKey => {
            whereOrOptions.push([fieldKey, 'like', '%' + k + '%']);
          });
        }
      }

      this.$emit('search', { where, whereLike, whereIn, whereOrOptions });
    },
  },
});
</script>
