<!-- actionList / headActionList / rowActionList：visibleWhen / disabledWhen / loadingWhen（与 jh-form interaction 同口径） -->
<script>
(function () {
  const jhActionWhenMixin = {
    methods: {
      _findPageVm() {
        return window.jhWhenUtil.findPageVm(this);
      },
      _actionWhenContext(item) {
        return window.jhWhenUtil.buildActionContext(this, {
          item,
          initialData: this.initialData,
          scope: this.scope,
        });
      },
      actionUiToken(action) {
        if (!action) return '';
        return action.uiAction || action.intent || '';
      },
      resolveDoUiActionId(action, item) {
        if (!action) return '';
        if (action.id) return action.id;
        if (action.actionId) return action.actionId;
        const token = this.actionUiToken(action);
        if (token === 'create') return 'startCreateItem';
        if (token === 'update') return 'startUpdateItem';
        if (token === 'delete') return item != null ? 'deleteItem' : 'batchDeleteItem';
        return token || '';
      },
      evaluateActionWhen(cond, defaultVal, item) {
        return window.jhWhenUtil.evaluateWhen(
          cond,
          defaultVal,
          this._actionWhenContext(item),
          this,
        );
      },
      isActionVisible(action, item) {
        if (!action) return false;
        if (item != null && typeof action.visible === 'function') {
          return !!action.visible(item);
        }
        if (typeof action.visible === 'boolean') return action.visible;
        return this.evaluateActionWhen(action.visibleWhen, true, item);
      },
      isActionDisabled(action, item) {
        if (!action) return false;
        if (this.isActionLoading(action, item)) return true;
        if (item != null && typeof action.disabled === 'function') {
          return !!action.disabled(item);
        }
        if (typeof action.disabled === 'boolean') return !!action.disabled;
        return this.evaluateActionWhen(action.disabledWhen, false, item);
      },
      isActionLoading(action, item) {
        if (!action) return false;
        if (item != null && typeof action.loading === 'function') {
          return !!action.loading(item);
        }
        if (typeof action.loading === 'boolean') return action.loading;
        return this.evaluateActionWhen(action.loadingWhen, false, item);
      },
      filterVisibleActions(list, item) {
        return (list || []).filter(a => this.isActionVisible(a, item));
      },
    },
  };
  window.jhActionWhenMixin = jhActionWhenMixin;
})();
</script>
