<script type="text/html" id="jh-icon">
  <span class="jh-icon" :style="iconStyles" :key="iconName" @click="$emit('click', $event)">
    <span
      class="iconify"
      :data-icon="iconName"
      :data-width="realSize"
      :data-height="realSize"
    ></span>
  </span>
</script>

<script src="/<$ ctx.app.config.appId $>/public/lib/iconify/iconify.min.js"></script>
<script>
window.jhIconCollectionsReady = window.jhIconCollectionsReady || (async () => {
  const collectionList = ['tabler', 'lucide'];
  for (const prefix of collectionList) {
    const response = await fetch(`/<$ ctx.app.config.appId $>/public/lib/iconify/collections/${prefix}.json`);
    if (!response.ok) {
      console.error(`[jh-icon] Failed to load local icon collection: ${prefix}`);
      continue;
    }
    const collection = await response.json();
    window.Iconify?.addCollection(collection);
  }
})();
</script>
<script>
  Vue.component('jh-icon', {
    template: '#jh-icon',
    props: {
      name: { type: String, required: true },
      size: { type: [Number, String], default: 20 },
      stroke: { type: [Number, String], default: 1.5 }
    },
    data() {
      return {
        sizeMap: {
          'x-small': 12,
          'small': 16,
          'medium': 20,
          'large': 24,
          'x-large': 28
        },
        prefix: 'tabler'
      }
    },
    computed: {
      realSize() {
        return this.sizeMap[this.size] || this.size || '1em'
      },
      iconName() {
        return this.name.includes(':')
          ? this.name
          : `${this.prefix}:${this.name}`
      },
      iconStyles() {
        const strokeValue = typeof this.stroke === 'number' 
          ? this.stroke 
          : parseFloat(this.stroke)
        
        return {
          '--stroke-width': isNaN(strokeValue) ? '1.5' : strokeValue.toString(),
          'width': this.realSize + 'px',
          'height': this.realSize + 'px'
        }
      }
    }
  })
</script>
<style>
  .jh-icon {
    display: inline-flex;
    line-height: 0;
    vertical-align: top;
    margin: 0;
    padding: 0;
  }
  
  .jh-icon svg {
    width: 100%;
    height: 100%;
  }
  
  /* 强制覆盖所有SVG元素的stroke-width */
  .jh-icon svg,
  .jh-icon svg path,
  .jh-icon svg line,
  .jh-icon svg polyline,
  .jh-icon svg polygon,
  .jh-icon svg circle,
  .jh-icon svg rect,
  .jh-icon svg ellipse {
    stroke-width: var(--stroke-width, 1.5) !important;
  }
</style>
